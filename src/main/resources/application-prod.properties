server.port=8082
logging.level.com.omnistack.backend=WARN
app.integrations.mock-enabled=false

# Oracle TUKUNAFUNC — BD prod (IN_OMNI_*: config y logs de proveedores) en HPROD (env vars del pod)
app.datasource.prod.url=${APP_DATASOURCE_PROD_URL}
app.datasource.prod.username=${APP_DATASOURCE_PROD_USERNAME}
app.datasource.prod.password=${APP_DATASOURCE_PROD_PASSWORD}
app.datasource.prod.schema=${APP_DATASOURCE_PROD_SCHEMA:TUKUNAFUNC}

# Oracle RMS — items maestros + catálogo AD_* via gpf_omnistack. (gpf_lectura en HPROD)
app.datasource.rms.url=${APP_DATASOURCE_RMS_URL}
app.datasource.rms.username=${APP_DATASOURCE_RMS_USERNAME}
app.datasource.rms.password=${APP_DATASOURCE_RMS_PASSWORD}
