spring.application.name=omnistack-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.main.banner-mode=off

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packagesToScan=com.omnistack.backend.controller

management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always

logging.level.root=INFO
logging.level.com.omnistack.backend=DEBUG
logging.pattern.level=%5p [cid:%X{correlationId}]

app.swagger.title=OMNISTACK Backend API
app.swagger.description=API interna para orquestacion transaccional multi-linea de negocio
app.swagger.version=1.0.0

app.catalog.refresh.fixed-delay-ms=${APP_CATALOG_REFRESH_FIXED_DELAY_MS:21600000}
app.catalog.refresh.initial-delay-ms=${APP_CATALOG_REFRESH_INITIAL_DELAY_MS:30000}
app.business-lines.source=${APP_BUSINESS_LINES_SOURCE:oracle}
app.business-lines.consent-text-max-line-length=${APP_BUSINESS_LINES_CONSENT_TEXT_MAX_LINE_LENGTH:56}
app.business-lines.cache.ttl-hours=${APP_BUSINESS_LINES_CACHE_TTL_HOURS:6}
app.business-lines.default-request.chain=${APP_BUSINESS_LINES_DEFAULT_REQUEST_CHAIN:1}
app.business-lines.default-request.store=${APP_BUSINESS_LINES_DEFAULT_REQUEST_STORE:148}
app.business-lines.default-request.store-name=${APP_BUSINESS_LINES_DEFAULT_REQUEST_STORE_NAME:FYBECA AMAZONAS}
app.business-lines.default-request.pos=${APP_BUSINESS_LINES_DEFAULT_REQUEST_POS:1}
app.business-lines.default-request.channel-pos=${APP_BUSINESS_LINES_DEFAULT_REQUEST_CHANNEL_POS:POS}
app.business-lines.canal-codigos.POS=${APP_BUSINESS_LINES_CANAL_CODIGOS_POS:1}


app.integrations.default-connect-timeout-ms=${APP_INTEGRATIONS_DEFAULT_CONNECT_TIMEOUT_MS:10000}
app.integrations.default-read-timeout-ms=${APP_INTEGRATIONS_DEFAULT_READ_TIMEOUT_MS:20000}
app.integrations.mock-enabled=${APP_INTEGRATIONS_MOCK_ENABLED:false}

# Circuit breaker — configuracion base para todos los proveedores
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.configs.default.record-exceptions=com.omnistack.backend.shared.exception.IntegrationException,java.io.IOException,java.util.concurrent.TimeoutException

resilience4j.circuitbreaker.instances.ecuabet.base-config=default
resilience4j.circuitbreaker.instances.bet593.base-config=default
resilience4j.circuitbreaker.instances.pega3.base-config=default
resilience4j.circuitbreaker.instances.tradicional.base-config=default
resilience4j.circuitbreaker.instances.claro.base-config=default

app.datasource.prod.driver-class-name=oracle.jdbc.OracleDriver
app.datasource.rms.driver-class-name=oracle.jdbc.OracleDriver
